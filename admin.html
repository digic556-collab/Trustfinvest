<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trustfinvest - Admin Dashboard. Manage platform operations, users, and financial transactions.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0056D2">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Admin Dashboard | Trustfinvest">
    <meta property="og:description" content="Admin Dashboard for Trustfinvest.">
    <meta property="og:image" content="https://trustfinvest.com/img/download.png">
    <meta property="og:url" content="https://trustfinvest.com/admin.html">
    <meta property="og:type" content="website">

    <title>Admin Dashboard | Trustfinvest</title>
    <link rel="shortcut icon" href="/img/download.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/admin.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- Notification Container -->
    <div id="notification-container"></div>

    <!-- Login Screen -->
    <div class="admin-login" id="adminLogin">
        <div class="login-container">
            <div class="login-header">
                <img src="img/download.png" alt="Trustfinvest Logo" class="admin-logo">
                <h2>Admin Access</h2>
                <p>Trustfinvest Management Portal</p>
            </div>
            
            <form class="login-form" id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" placeholder="Enter admin email" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <div class="input-with-icon">
                        <input type="password" id="adminPassword" placeholder="Enter password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('adminPassword')">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Access Dashboard</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Main Admin Dashboard (remains the same) -->
    <div class="admin-dashboard" id="adminDashboard" style="display: none;">
        <!-- Sidebar, Topbar, and Page Content -->
    </div>

    <script type="module" src="./js/admin.js"></script>
    <script>
        // Toggle Password Visibility
        function togglePasswordVisibility(id) {
            const passwordInput = document.getElementById(id);
            const icon = passwordInput.nextElementSibling.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
